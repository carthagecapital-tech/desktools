<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Case Converter & Transformer — Free Online Tool | DeskTools</title>
    <meta name="description" content="Free online text case converter. Transform text to uppercase, lowercase, title case, camelCase, snake_case, kebab-case, and more. Count words, sort lines, remove duplicates.">
    <meta name="keywords" content="text case converter, uppercase converter, lowercase converter, camelCase converter, snake_case, word counter, text transformer">
    <meta property="og:title" content="Text Case Converter & Transformer — DeskTools">
    <meta property="og:description" content="Convert text between cases, count words, sort lines, remove duplicates — all in your browser.">
    <meta property="og:url" content="https://desktools.dev/text-transformer">
    <link rel="canonical" href="https://desktools.dev/text-transformer">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="tool-content">
    <div class="tool-page-header">
        <a href="/" class="back-link">← Back to tools</a>
        <h1>Text Transformer</h1>
        <p class="desc">Transform, clean, and convert text instantly.</p>
    </div>
    <div class="workspace">
        <div class="workspace-toolbar">
            <div class="toolbar-group transform-buttons">
                <button class="active" onclick="transformText('upper', this)">UPPER</button>
                <button onclick="transformText('lower', this)">lower</button>
                <button onclick="transformText('title', this)">Title Case</button>
                <button onclick="transformText('sentence', this)">Sentence</button>
                <button onclick="transformText('camel', this)">camelCase</button>
                <button onclick="transformText('snake', this)">snake_case</button>
                <button onclick="transformText('kebab', this)">kebab-case</button>
                <button onclick="transformText('reverse', this)">Reverse</button>
                <button onclick="transformText('sort', this)">Sort Lines</button>
                <button onclick="transformText('dedupe', this)">Dedupe</button>
                <button onclick="transformText('trim', this)">Trim</button>
            </div>
            <div class="toolbar-group"><button onclick="copyOutput('text-output')">Copy</button></div>
        </div>
        <div class="split-workspace">
            <div><span class="pane-label">Input</span><textarea class="tool-input" id="text-input" placeholder="Paste your text here..." oninput="autoTransformText()"></textarea></div>
            <div><span class="pane-label">Output</span><textarea class="tool-input" id="text-output" readonly style="color:var(--accent);background:transparent;"></textarea></div>
        </div>
    </div>
    <div style="padding:16px 20px;font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text-muted);display:flex;gap:24px;">
        <span>Words: <span id="word-count">0</span></span>
        <span>Characters: <span id="char-count">0</span></span>
        <span>Lines: <span id="line-count">0</span></span>
    </div>
</div>

<script src="/shared.js"></script>
<script>
    let currentTransform = 'upper';
    function transformText(type, btn) {
        currentTransform = type;
        if (btn) { document.querySelectorAll('.transform-buttons button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        autoTransformText();
    }
    function autoTransformText() {
        const input = document.getElementById('text-input').value;
        const output = document.getElementById('text-output');
        const words = input.trim() ? input.trim().split(/\s+/).length : 0;
        document.getElementById('word-count').textContent = words;
        document.getElementById('char-count').textContent = input.length;
        document.getElementById('line-count').textContent = input ? input.split('\n').length : 0;
        let result = input;
        switch (currentTransform) {
            case 'upper': result = input.toUpperCase(); break;
            case 'lower': result = input.toLowerCase(); break;
            case 'title': result = input.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase()); break;
            case 'sentence': result = input.toLowerCase().replace(/(^\s*\w|[.!?]\s+\w)/g, c => c.toUpperCase()); break;
            case 'camel': result = input.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g, (_, c) => c.toUpperCase()); break;
            case 'snake': result = input.toLowerCase().replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, ''); break;
            case 'kebab': result = input.toLowerCase().replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, ''); break;
            case 'reverse': result = input.split('').reverse().join(''); break;
            case 'sort': result = input.split('\n').sort().join('\n'); break;
            case 'dedupe': result = [...new Set(input.split('\n'))].join('\n'); break;
            case 'trim': result = input.split('\n').map(l => l.trim()).filter(l => l).join('\n'); break;
        }
        output.value = result;
    }
</script>
</body>
</html>
