<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CSP Header Generator — Content Security Policy Builder | DeskTools</title>
<meta name="description" content="Build Content-Security-Policy headers visually. Pick directives, add sources, copy the header. No more CSP syntax headaches."/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#0f0f16;--bg3:#14141e;--border:rgba(255,255,255,0.07);--accent:#00d4aa;--accent2:#00b894;--text:#e8e8f0;--muted:#6b6b80;--card-bg:#111118}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
.back-link{display:inline-flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.85rem;text-decoration:none;padding:.75rem 2rem;transition:color .2s}.back-link:hover{color:var(--accent)}
.page{max-width:720px;margin:0 auto;padding:2.5rem 2rem 4rem}
h1{font-size:1.8rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.4rem}
.sub{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem}
.card-title{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:1rem}
.directive{margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.directive:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.dir-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.dir-name{font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:700;color:var(--accent)}
.dir-desc{font-size:.75rem;color:var(--muted)}
.toggle{position:relative;width:38px;height:20px;cursor:pointer}
.toggle input{display:none}
.toggle-track{position:absolute;inset:0;background:var(--bg3);border:1px solid var(--border);border-radius:10px;transition:all .2s}
.toggle input:checked+.toggle-track{background:rgba(0,212,170,0.2);border-color:var(--accent)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:var(--muted);border-radius:50%;transition:all .2s}
.toggle input:checked~.toggle-thumb{left:21px;background:var(--accent)}
.sources{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem}
.source-chip{display:flex;align-items:center;gap:.3rem;font-family:'JetBrains Mono',monospace;font-size:.72rem;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.25rem .5rem;color:var(--text)}
.source-chip .kw{color:var(--accent)}
.source-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:0 .1rem;line-height:1;transition:color .15s}
.source-del:hover{color:#ff6b6b}
.add-source{display:flex;gap:.4rem;margin-top:.5rem}
.add-source input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.78rem;padding:.35rem .6rem;outline:none;transition:border-color .2s}
.add-source input:focus{border-color:var(--accent)}
.add-source input::placeholder{color:var(--muted)}
.add-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.72rem;padding:.35rem .6rem;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}
.quick-btns{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem}
.qbtn{font-family:'JetBrains Mono',monospace;font-size:.68rem;background:none;border:1px solid var(--border);color:var(--muted);padding:.2rem .45rem;border-radius:4px;cursor:pointer;transition:all .15s}
.qbtn:hover{border-color:var(--accent);color:var(--accent)}
.output-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1.25rem;position:relative}
.output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
.output-title{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.copy-btn{background:var(--accent);color:#0a0a0f;border:none;font-family:'Outfit',sans-serif;font-weight:600;font-size:.78rem;padding:.4rem .85rem;border-radius:6px;cursor:pointer;transition:background .2s}
.copy-btn:hover{background:var(--accent2)}
.output-code{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent);word-break:break-all;line-height:1.7;min-height:2rem}
.empty-msg{color:var(--muted);font-style:italic}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:420px;position:relative;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem}
.modal h2{font-size:1.2rem;font-weight:600;margin-bottom:.4rem}
.modal p{font-size:.85rem;color:var(--muted);margin-bottom:1.5rem}
.modal-field{margin-bottom:1rem}
.modal-field label{font-size:.8rem;font-weight:500;color:var(--muted);display:block;margin-bottom:.4rem}
.modal-field input,.modal-field textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.9rem;padding:.6rem .85rem;outline:none;transition:border-color .2s;resize:vertical}
.modal-field input:focus,.modal-field textarea:focus{border-color:var(--accent)}
.modal-submit{width:100%;background:var(--accent);color:#0a0a0f;font-family:'Outfit',sans-serif;font-weight:600;font-size:.95rem;border:none;border-radius:8px;padding:.7rem;cursor:pointer;transition:background .2s;margin-top:.5rem}
.modal-submit:hover{background:var(--accent2)}
.modal-success{text-align:center;padding:1rem 0;display:none}
.modal-success.show{display:block}
.modal-success .check{font-size:2rem;margin-bottom:.5rem}
</style>
</head>
<body>
<a href="/" class="back-link">&#x2190; Back to tools</a>
<div class="page">
  <h1>CSP Header Generator</h1>
  <p class="sub">Build Content-Security-Policy headers visually. No more syntax headaches.</p>

  <div class="card">
    <div class="card-title">Directives</div>
    <div id="directives"></div>
  </div>

  <div class="output-card">
    <div class="output-header">
      <span class="output-title">Generated Header</span>
      <button class="copy-btn" onclick="copyCSP()">Copy</button>
    </div>
    <div class="output-code" id="output"><span class="empty-msg">Enable directives above to generate your CSP header</span></div>
  </div>
</div>

<script src="/shared.js"></script>
<script>
const DIRECTIVES=[
  {name:'default-src',desc:'Fallback for all resource types',defaults:["'self'"]},
  {name:'script-src',desc:'JavaScript sources',defaults:[]},
  {name:'style-src',desc:'Stylesheet sources',defaults:[]},
  {name:'img-src',desc:'Image sources',defaults:[]},
  {name:'font-src',desc:'Font sources',defaults:[]},
  {name:'connect-src',desc:'XHR, WebSocket, fetch destinations',defaults:[]},
  {name:'media-src',desc:'Audio & video sources',defaults:[]},
  {name:'object-src',desc:'Plugin content (Flash, etc.)',defaults:["'none'"]},
  {name:'frame-src',desc:'Nested browsing contexts (iframes)',defaults:[]},
  {name:'frame-ancestors',desc:'Who can embed this page',defaults:["'self'"]},
  {name:'base-uri',desc:'Restrict <base> element URLs',defaults:["'self'"]},
  {name:'form-action',desc:'Form submission targets',defaults:["'self'"]},
  {name:'upgrade-insecure-requests',desc:'Upgrade HTTP to HTTPS',defaults:[], noSources:true},
];

const QUICK_SOURCES=["'self'","'none'","'unsafe-inline'","'unsafe-eval'","https:","data:","blob:","*.googleapis.com","*.gstatic.com","*.cloudflare.com","cdn.jsdelivr.net"];

let state={};

function init(){
  DIRECTIVES.forEach(d=>{
    state[d.name]={enabled:d.defaults.length>0||d.noSources,sources:[...d.defaults]};
  });
  render();
}

function render(){
  const container=document.getElementById('directives');
  container.innerHTML='';
  DIRECTIVES.forEach(d=>{
    const s=state[d.name];
    const div=document.createElement('div');
    div.className='directive';
    div.innerHTML=
      '<div class="dir-header">'+
      '  <div><span class="dir-name">'+d.name+'</span><div class="dir-desc">'+d.desc+'</div></div>'+
      '  <label class="toggle"><input type="checkbox" '+(s.enabled?'checked':'')+' onchange="toggleDir(\''+d.name+'\',this.checked)"/><span class="toggle-track"></span><span class="toggle-thumb"></span></label>'+
      '</div>';
    if(s.enabled&&!d.noSources){
      // Sources
      let sourcesHTML='<div class="sources">';
      s.sources.forEach((src,i)=>{
        const isKw=src.startsWith("'");
        sourcesHTML+='<span class="source-chip">'+(isKw?'<span class="kw">'+src+'</span>':'<span>'+src+'</span>')+' <button class="source-del" onclick="removeSrc(\''+d.name+'\','+i+')">&times;</button></span>';
      });
      sourcesHTML+='</div>';
      // Add input
      sourcesHTML+='<div class="add-source"><input type="text" placeholder="Add source (URL or keyword)" id="input-'+d.name+'" onkeydown="if(event.key===\'Enter\')addSrc(\''+d.name+'\')"/><button class="add-btn" onclick="addSrc(\''+d.name+'\')">+ Add</button></div>';
      // Quick buttons
      sourcesHTML+='<div class="quick-btns">';
      QUICK_SOURCES.forEach(qs=>{
        if(s.sources.indexOf(qs)===-1){
          sourcesHTML+='<button class="qbtn" onclick="quickAdd(\''+d.name+'\',\''+qs+'\')">'+qs+'</button>';
        }
      });
      sourcesHTML+='</div>';
      div.innerHTML+=sourcesHTML;
    }
    container.appendChild(div);
  });
  generateOutput();
}

function toggleDir(name,checked){
  state[name].enabled=checked;
  if(checked&&state[name].sources.length===0){
    const d=DIRECTIVES.find(x=>x.name===name);
    if(!d.noSources) state[name].sources=["'self'"];
  }
  render();
}

function addSrc(name){
  const input=document.getElementById('input-'+name);
  const val=input.value.trim();
  if(val&&state[name].sources.indexOf(val)===-1){
    state[name].sources.push(val);
    render();
  }
}

function quickAdd(name,src){
  if(state[name].sources.indexOf(src)===-1){
    state[name].sources.push(src);
    render();
  }
}

function removeSrc(name,idx){
  state[name].sources.splice(idx,1);
  render();
}

function generateOutput(){
  const parts=[];
  DIRECTIVES.forEach(d=>{
    const s=state[d.name];
    if(!s.enabled) return;
    if(d.noSources){parts.push(d.name);return;}
    if(s.sources.length>0) parts.push(d.name+' '+s.sources.join(' '));
  });
  const out=document.getElementById('output');
  if(parts.length===0){
    out.innerHTML='<span class="empty-msg">Enable directives above to generate your CSP header</span>';
  } else {
    out.textContent='Content-Security-Policy: '+parts.join('; ')+';';
  }
}

function copyCSP(){
  const out=document.getElementById('output');
  const text=out.textContent;
  if(text&&!text.includes('Enable directives')){
    navigator.clipboard.writeText(text);
    if(typeof showToast==='function') showToast('CSP header copied!');
  }
}

init();
</script>
</body>
</html>
