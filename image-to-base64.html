<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Base64 Converter — Free Online Tool | DeskTools</title>
    <meta name="description" content="Free online image to Base64 converter. Upload an image and get the Base64-encoded string instantly. Generate CSS background and HTML img tags. No upload to server.">
    <meta name="keywords" content="image to base64, base64 image encoder, image encoder, convert image to base64, base64 image, image to data URI">
    <meta property="og:title" content="Image to Base64 Converter — DeskTools">
    <meta property="og:url" content="https://desktools.dev/image-to-base64">
    <link rel="canonical" href="https://desktools.dev/image-to-base64">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="tool-content">
    <div class="tool-page-header">
        <a href="/" class="back-link">← Back to tools</a>
        <h1>Image to Base64</h1>
        <p class="desc">Convert images to Base64-encoded strings — everything stays in your browser.</p>
    </div>
    <div class="workspace">
        <div class="color-workspace">
            <div id="drop-zone" onclick="document.getElementById('file-input').click()" style="border:2px dashed var(--border);border-radius:12px;padding:48px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:24px;">
                <div style="font-size:2rem;color:var(--text-muted);margin-bottom:12px;">📁</div>
                <p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:4px;">Click or drag an image here</p>
                <p style="color:var(--text-muted);font-size:0.75rem;font-family:'JetBrains Mono',monospace;">PNG, JPG, GIF, SVG, WEBP</p>
                <input type="file" id="file-input" accept="image/*" onchange="handleFile(this.files[0])" style="display:none;">
            </div>
            <div id="result-area" style="display:none;">
                <div style="display:flex;gap:24px;margin-bottom:24px;align-items:start;">
                    <img id="preview-img" style="max-width:200px;max-height:200px;border-radius:8px;border:1px solid var(--border);">
                    <div style="flex:1;font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--text-secondary);line-height:2;">
                        <div>File: <span id="img-name" style="color:var(--text-primary);"></span></div>
                        <div>Type: <span id="img-type" style="color:var(--text-primary);"></span></div>
                        <div>Size: <span id="img-size" style="color:var(--text-primary);"></span></div>
                        <div>Dimensions: <span id="img-dims" style="color:var(--text-primary);"></span></div>
                        <div>Base64 length: <span id="img-b64len" style="color:var(--accent);"></span></div>
                    </div>
                </div>
                <div style="margin-bottom:16px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                        <span style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Data URI</span>
                        <button class="copy-btn" onclick="copyText(document.getElementById('out-datauri').value)">Copy</button>
                    </div>
                    <textarea id="out-datauri" readonly style="width:100%;height:80px;padding:12px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:0.75rem;resize:vertical;"></textarea>
                </div>
                <div style="margin-bottom:16px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                        <span style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">HTML &lt;img&gt; Tag</span>
                        <button class="copy-btn" onclick="copyText(document.getElementById('out-html').value)">Copy</button>
                    </div>
                    <textarea id="out-html" readonly style="width:100%;height:60px;padding:12px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.75rem;resize:vertical;"></textarea>
                </div>
                <div>
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                        <span style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">CSS Background</span>
                        <button class="copy-btn" onclick="copyText(document.getElementById('out-css').value)">Copy</button>
                    </div>
                    <textarea id="out-css" readonly style="width:100%;height:60px;padding:12px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.75rem;resize:vertical;"></textarea>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="/shared.js"></script>
<script>
    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; dropZone.style.background = 'var(--accent-dim)'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'var(--border)'; dropZone.style.background = 'transparent'; });
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--border)'; dropZone.style.background = 'transparent'; if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });

    function handleFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const dataUri = e.target.result;
            const img = document.getElementById('preview-img');
            img.src = dataUri;
            img.onload = function() {
                document.getElementById('img-dims').textContent = img.naturalWidth + ' × ' + img.naturalHeight + 'px';
            };
            document.getElementById('img-name').textContent = file.name;
            document.getElementById('img-type').textContent = file.type;
            document.getElementById('img-size').textContent = formatSize(file.size);
            document.getElementById('img-b64len').textContent = formatSize(dataUri.length);
            document.getElementById('out-datauri').value = dataUri;
            document.getElementById('out-html').value = '<img src="' + dataUri + '" alt="' + file.name + '">';
            document.getElementById('out-css').value = "background-image: url('" + dataUri + "');";
            document.getElementById('result-area').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
    }
</script>
</body>
</html>
