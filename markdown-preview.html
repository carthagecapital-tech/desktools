<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Markdown Preview","description":"Free online markdown editor with live preview. Write markdown and see it rendered instantly. Supports headings, bold, italic, code blocks, tables, links, and more.","url":"https://desktools.dev/markdown-preview","applicationCategory":"DeveloperApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"DeskTools","url":"https://desktools.dev"},"browserRequirements":"Requires a modern web browser","keywords":"markdown preview, markdown editor, markdown renderer"}</script>

</head>
<body>
<div class="tool-content">
    <div class="tool-page-header">
        <a href="/" class="back-link">← Back to tools</a>
        <h1>Markdown Preview</h1>
        <p class="desc">Write markdown and see it rendered live — pure browser parsing.</p>
    </div>
    <div class="workspace">
        <div class="workspace-toolbar">
            <div class="toolbar-group"><button onclick="copyOutput('md-input')">Copy Markdown</button><button onclick="copyMdHtml()">Copy HTML</button></div>
            <div class="toolbar-group"><button onclick="loadMdExample()">Load Example</button><button onclick="document.getElementById('md-input').value='';renderMarkdown()">Clear</button></div>
        </div>
        <div class="split-workspace">
            <div><span class="pane-label">Markdown</span><textarea class="tool-input" id="md-input" placeholder="# Write your markdown here..." oninput="renderMarkdown()"></textarea></div>
            <div><span class="pane-label">Preview</span><div id="md-output" style="padding:20px;min-height:300px;overflow:auto;line-height:1.7;font-size:0.9rem;"></div></div>
        </div>
    </div>
</div>
<script src="/shared.js"></script>
<script>
    function loadMdExample(){document.getElementById('md-input').value='# Heading 1\n## Heading 2\n### Heading 3\n\nA paragraph with **bold**, *italic*, and `inline code`.\n\n- List item one\n- List item two\n- List item three\n\n1. Numbered one\n2. Numbered two\n3. Numbered three\n\n> A blockquote looks like this.\n> It can span multiple lines.\n\n```\nconst x = 42;\nconsole.log(x);\n```\n\n[Link text](https://desktools.dev)\n\n| Header | Header 2 |\n|--------|----------|\n| Cell 1 | Cell 2   |\n| Cell 3 | Cell 4   |\n\n---\n\nThat is a horizontal rule above.';renderMarkdown();}
    function renderMarkdown(){const input=document.getElementById('md-input').value;const output=document.getElementById('md-output');let html=input;
    html=html.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre style="background:var(--bg-surface);padding:16px;border-radius:8px;border:1px solid var(--border);overflow-x:auto;margin:12px 0;"><code>$2</code></pre>');
    html=html.replace(/^(\|.+\|)\n(\|[-:\s|]+\|)\n((?:\|.+\|\n?)*)/gm,(match,header,sep,body)=>{const ths=header.split('|').filter(c=>c.trim()).map(c=>'<th style="padding:8px 12px;border:1px solid var(--border);background:var(--bg-surface);">'+c.trim()+'</th>').join('');const rows=body.trim().split('\n').map(r=>{const tds=r.split('|').filter(c=>c.trim()).map(c=>'<td style="padding:8px 12px;border:1px solid var(--border);">'+c.trim()+'</td>').join('');return'<tr>'+tds+'</tr>';}).join('');return'<table style="border-collapse:collapse;width:100%;margin:12px 0;"><thead><tr>'+ths+'</tr></thead><tbody>'+rows+'</tbody></table>';});
    html=html.replace(/^### (.+)$/gm,'<h3 style="font-size:1.1rem;margin:16px 0 8px;color:var(--text-primary);">$1</h3>');
    html=html.replace(/^## (.+)$/gm,'<h2 style="font-size:1.3rem;margin:20px 0 10px;color:var(--text-primary);">$1</h2>');
    html=html.replace(/^# (.+)$/gm,'<h1 style="font-size:1.6rem;margin:24px 0 12px;color:var(--text-primary);">$1</h1>');
    html=html.replace(/^---$/gm,'<hr style="border:none;border-top:1px solid var(--border);margin:20px 0;">');
    html=html.replace(/^> (.+)$/gm,'<blockquote style="border-left:3px solid var(--accent);padding:8px 16px;margin:12px 0;color:var(--text-secondary);background:var(--accent-dim);border-radius:0 6px 6px 0;">$1</blockquote>');
    html=html.replace(/\*\*(.+?)\*\*/g,'<strong style="color:var(--text-primary);">$1</strong>');
    html=html.replace(/\*(.+?)\*/g,'<em>$1</em>');
    html=html.replace(/`([^`]+)`/g,'<code style="background:var(--bg-surface);padding:2px 6px;border-radius:4px;font-family:JetBrains Mono,monospace;font-size:0.8rem;color:var(--accent);">$1</code>');
    html=html.replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" style="color:var(--accent);text-decoration:underline;">$1</a>');
    html=html.replace(/^- (.+)$/gm,'<li style="margin:4px 0;margin-left:20px;">$1</li>');
    html=html.replace(/^\d+\. (.+)$/gm,'<li style="margin:4px 0;margin-left:20px;list-style:decimal;">$1</li>');
    html=html.replace(/\n\n/g,'</p><p style="margin:10px 0;">');
    html=html.replace(/\n/g,'<br>');
    output.innerHTML='<div style="color:var(--text-secondary);">'+html+'</div>';}
    function copyMdHtml(){navigator.clipboard.writeText(document.getElementById('md-output').innerHTML);showToast('HTML copied');}
</script>
</body>
</html>
