</head>
<body>
<div class="tool-content">
    <div class="tool-page-header">
        <a href="/" class="back-link">← Back to tools</a>
        <h1>Aspect Ratio Calculator</h1>
        <p class="desc">Calculate aspect ratios, resize dimensions proportionally, or find the ratio from any width and height.</p>
    </div>
    <div class="workspace">
        <div class="color-workspace">
            <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:24px;align-items:center;margin-bottom:32px;">
                <div>
                    <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Width</label>
                    <input type="number" id="ar-w1" value="1920" oninput="calcFromDimensions()" style="width:100%;padding:16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:1.2rem;text-align:center;">
                </div>
                <div style="text-align:center;">
                    <div id="ar-ratio" style="font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;color:var(--accent);">16:9</div>
                    <div style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-muted);margin-top:4px;">RATIO</div>
                </div>
                <div>
                    <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Height</label>
                    <input type="number" id="ar-h1" value="1080" oninput="calcFromDimensions()" style="width:100%;padding:16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:1.2rem;text-align:center;">
                </div>
            </div>
            
            <!-- Visual preview -->
            <div style="display:flex;justify-content:center;margin-bottom:32px;">
                <div id="ar-preview" style="border:2px solid var(--accent);border-radius:4px;background:var(--accent-dim);transition:all 0.3s;"></div>
            </div>

            <!-- Resize calculator -->
            <div class="palette-section">
                <h4>Resize (Locked Ratio)</h4>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;">
                    <div>
                        <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;">New Width</label>
                        <input type="number" id="ar-w2" placeholder="Enter width..." oninput="calcNewHeight()" style="width:100%;padding:12px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.9rem;">
                    </div>
                    <div>
                        <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;">New Height</label>
                        <input type="number" id="ar-h2" placeholder="Enter height..." oninput="calcNewWidth()" style="width:100%;padding:12px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:0.9rem;">
                    </div>
                </div>
            </div>

            <!-- Presets -->
            <div class="palette-section">
                <h4>Common Presets</h4>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <button class="copy-btn" onclick="setPreset(16,9)">16:9</button>
                    <button class="copy-btn" onclick="setPreset(4,3)">4:3</button>
                    <button class="copy-btn" onclick="setPreset(21,9)">21:9</button>
                    <button class="copy-btn" onclick="setPreset(1,1)">1:1</button>
                    <button class="copy-btn" onclick="setPreset(9,16)">9:16</button>
                    <button class="copy-btn" onclick="setPreset(3,2)">3:2</button>
                    <button class="copy-btn" onclick="setPreset(5,4)">5:4</button>
                    <button class="copy-btn" onclick="setPreset(32,9)">32:9</button>
                </div>
                <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
                    <button class="copy-btn" onclick="setDims(1920,1080)">1080p</button>
                    <button class="copy-btn" onclick="setDims(2560,1440)">1440p</button>
                    <button class="copy-btn" onclick="setDims(3840,2160)">4K</button>
                    <button class="copy-btn" onclick="setDims(1080,1920)">IG Story</button>
                    <button class="copy-btn" onclick="setDims(1200,630)">OG Image</button>
                    <button class="copy-btn" onclick="setDims(1280,720)">720p</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="/shared.js"></script>
<script>
    function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
    
    function calcFromDimensions() {
        const w = parseInt(document.getElementById('ar-w1').value) || 0;
        const h = parseInt(document.getElementById('ar-h1').value) || 0;
        if (w > 0 && h > 0) {
            const g = gcd(w, h);
            document.getElementById('ar-ratio').textContent = (w/g) + ':' + (h/g);
            updatePreview(w, h);
        }
    }

    function calcNewHeight() {
        const w1 = parseInt(document.getElementById('ar-w1').value) || 0;
        const h1 = parseInt(document.getElementById('ar-h1').value) || 0;
        const w2 = parseInt(document.getElementById('ar-w2').value) || 0;
        if (w1 > 0 && h1 > 0 && w2 > 0) {
            document.getElementById('ar-h2').value = Math.round(w2 * (h1 / w1));
        }
    }

    function calcNewWidth() {
        const w1 = parseInt(document.getElementById('ar-w1').value) || 0;
        const h1 = parseInt(document.getElementById('ar-h1').value) || 0;
        const h2 = parseInt(document.getElementById('ar-h2').value) || 0;
        if (w1 > 0 && h1 > 0 && h2 > 0) {
            document.getElementById('ar-w2').value = Math.round(h2 * (w1 / h1));
        }
    }

    function setPreset(rw, rh) {
        const currentW = parseInt(document.getElementById('ar-w1').value) || 1920;
        document.getElementById('ar-w1').value = currentW;
        document.getElementById('ar-h1').value = Math.round(currentW * (rh / rw));
        calcFromDimensions();
    }

    function setDims(w, h) {
        document.getElementById('ar-w1').value = w;
        document.getElementById('ar-h1').value = h;
        calcFromDimensions();
    }

    function updatePreview(w, h) {
        const maxW = 200, maxH = 120;
        const scale = Math.min(maxW / w, maxH / h);
        const pW = Math.max(20, Math.round(w * scale));
        const pH = Math.max(20, Math.round(h * scale));
        const el = document.getElementById('ar-preview');
        el.style.width = pW + 'px';
        el.style.height = pH + 'px';
    }

    calcFromDimensions();
</script>
</body>
</html>
