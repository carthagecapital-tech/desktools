<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unix Timestamp Converter — Epoch Time Converter Online | DeskTools</title>
    <meta name="description" content="Free online Unix timestamp converter. Convert between Unix epoch time and human-readable dates. See the current timestamp live. Supports seconds and milliseconds.">
    <meta name="keywords" content="unix timestamp converter, epoch converter, timestamp to date, date to timestamp, unix time, epoch time converter">
    <meta property="og:title" content="Unix Timestamp Converter — DeskTools">
    <meta property="og:url" content="https://desktools.dev/timestamp-converter">
    <link rel="canonical" href="https://desktools.dev/timestamp-converter">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<nav><a href="/" class="logo">desk<span>tools</span></a><ul class="nav-links"><li><a href="/">Tools</a></li><li><a href="#" onclick="event.preventDefault();document.getElementById('request-modal').style.display='flex'" style="background:var(--accent);color:var(--bg-deep);padding:6px 14px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:0.8rem;font-weight:600;">Request a Tool</a></li></ul></nav>
<div class="tool-content">
    <div class="tool-page-header">
        <a href="/" class="back-link">← Back to tools</a>
        <h2>Timestamp Converter</h2>
        <p class="desc">Convert between Unix timestamps and human-readable dates.</p>
    </div>

    <!-- Live Clock -->
    <div class="workspace" style="margin-bottom:20px;">
        <div class="color-workspace" style="text-align:center;padding:24px;">
            <div style="font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Current Unix Timestamp</div>
            <div id="live-ts" style="font-family:'JetBrains Mono',monospace;font-size:2.2rem;font-weight:700;color:var(--accent);cursor:pointer;" onclick="copyText(this.textContent)"></div>
            <div id="live-date" style="font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--text-secondary);margin-top:8px;"></div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-muted);margin-top:4px;">Click timestamp to copy</div>
        </div>
    </div>

    <!-- Timestamp to Date -->
    <div class="workspace" style="margin-bottom:20px;">
        <div class="workspace-toolbar">
            <div class="toolbar-group"><span style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--text-primary);font-weight:600;">Timestamp → Date</span></div>
        </div>
        <div class="color-workspace">
            <div style="display:flex;gap:12px;align-items:center;margin-bottom:20px;">
                <input type="text" id="ts-input" placeholder="Enter Unix timestamp (e.g. 1774800000)" oninput="tsToDate()" style="flex:1;padding:14px 16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:1rem;">
                <label style="display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;cursor:pointer;white-space:nowrap;"><input type="checkbox" id="ts-ms" onchange="tsToDate()" style="accent-color:var(--accent);"> Milliseconds</label>
            </div>
            <div id="ts-result" style="font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--text-secondary);line-height:2;"></div>
        </div>
    </div>

    <!-- Date to Timestamp -->
    <div class="workspace">
        <div class="workspace-toolbar">
            <div class="toolbar-group"><span style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--text-primary);font-weight:600;">Date → Timestamp</span></div>
        </div>
        <div class="color-workspace">
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;">
                <div>
                    <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Year</label>
                    <input type="number" id="dt-year" style="width:100%;padding:10px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.85rem;" onchange="dateToTs()">
                </div>
                <div>
                    <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Month</label>
                    <input type="number" id="dt-month" min="1" max="12" style="width:100%;padding:10px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.85rem;" onchange="dateToTs()">
                </div>
                <div>
                    <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Day</label>
                    <input type="number" id="dt-day" min="1" max="31" style="width:100%;padding:10px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.85rem;" onchange="dateToTs()">
                </div>
                <div>
                    <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Hour</label>
                    <input type="number" id="dt-hour" min="0" max="23" value="0" style="width:100%;padding:10px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.85rem;" onchange="dateToTs()">
                </div>
                <div>
                    <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Minute</label>
                    <input type="number" id="dt-min" min="0" max="59" value="0" style="width:100%;padding:10px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.85rem;" onchange="dateToTs()">
                </div>
                <div>
                    <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">Second</label>
                    <input type="number" id="dt-sec" min="0" max="59" value="0" style="width:100%;padding:10px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.85rem;" onchange="dateToTs()">
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
                <div id="dt-result" style="flex:1;padding:14px 16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:1rem;">—</div>
                <button class="copy-btn" onclick="copyText(document.getElementById('dt-result').textContent)" style="padding:14px 16px;">Copy</button>
            </div>
        </div>
    </div>
</div>
<div class="toast" id="toast">Copied!</div>
<footer><p>DeskTools — built for people who ship. <a href="https://desktools.dev">desktools.dev</a></p></footer>
<script src="shared.js"></script>
<script>
    // Live clock
    function updateLive() {
        const now = Math.floor(Date.now() / 1000);
        document.getElementById('live-ts').textContent = now;
        document.getElementById('live-date').textContent = new Date().toUTCString();
    }
    setInterval(updateLive, 1000);
    updateLive();

    // Init date fields to now
    const now = new Date();
    document.getElementById('dt-year').value = now.getFullYear();
    document.getElementById('dt-month').value = now.getMonth() + 1;
    document.getElementById('dt-day').value = now.getDate();
    document.getElementById('dt-hour').value = now.getHours();
    document.getElementById('dt-min').value = now.getMinutes();
    document.getElementById('dt-sec').value = now.getSeconds();
    dateToTs();

    // Timestamp to Date
    function tsToDate() {
        const input = document.getElementById('ts-input').value.trim();
        const result = document.getElementById('ts-result');
        if (!input) { result.innerHTML = ''; return; }
        
        let ts = parseInt(input);
        if (isNaN(ts)) { result.innerHTML = '<span style="color:#ff6b6b;">Invalid timestamp</span>'; return; }
        
        const isMs = document.getElementById('ts-ms').checked;
        const date = new Date(isMs ? ts : ts * 1000);
        
        if (isNaN(date.getTime())) { result.innerHTML = '<span style="color:#ff6b6b;">Invalid timestamp</span>'; return; }
        
        result.innerHTML = 
            '<div style="margin-bottom:8px;"><span style="color:var(--text-muted);width:80px;display:inline-block;">UTC:</span> ' + date.toUTCString() + '</div>' +
            '<div style="margin-bottom:8px;"><span style="color:var(--text-muted);width:80px;display:inline-block;">Local:</span> ' + date.toString() + '</div>' +
            '<div style="margin-bottom:8px;"><span style="color:var(--text-muted);width:80px;display:inline-block;">ISO:</span> <span style="color:var(--accent);">' + date.toISOString() + '</span></div>' +
            '<div><span style="color:var(--text-muted);width:80px;display:inline-block;">Relative:</span> ' + timeAgo(date) + '</div>';
    }

    function timeAgo(date) {
        const seconds = Math.floor((Date.now() - date.getTime()) / 1000);
        if (seconds < 0) return Math.abs(seconds) < 60 ? 'in ' + Math.abs(seconds) + ' seconds' : 'in the future';
        if (seconds < 60) return seconds + ' seconds ago';
        if (seconds < 3600) return Math.floor(seconds / 60) + ' minutes ago';
        if (seconds < 86400) return Math.floor(seconds / 3600) + ' hours ago';
        if (seconds < 2592000) return Math.floor(seconds / 86400) + ' days ago';
        if (seconds < 31536000) return Math.floor(seconds / 2592000) + ' months ago';
        return Math.floor(seconds / 31536000) + ' years ago';
    }

    // Date to Timestamp
    function dateToTs() {
        const y = parseInt(document.getElementById('dt-year').value);
        const m = parseInt(document.getElementById('dt-month').value) - 1;
        const d = parseInt(document.getElementById('dt-day').value);
        const h = parseInt(document.getElementById('dt-hour').value);
        const mi = parseInt(document.getElementById('dt-min').value);
        const s = parseInt(document.getElementById('dt-sec').value);
        const date = new Date(y, m, d, h, mi, s);
        if (isNaN(date.getTime())) { document.getElementById('dt-result').textContent = 'Invalid date'; return; }
        document.getElementById('dt-result').textContent = Math.floor(date.getTime() / 1000);
    }
</script>
</body>
</html>
