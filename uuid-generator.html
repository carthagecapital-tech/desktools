<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID Generator — Free Online UUID/GUID Generator | DeskTools</title>
    <meta name="description" content="Free online UUID generator. Generate v4 UUIDs instantly. Bulk generate up to 100 UUIDs at once. Copy with one click. No signup required.">
    <meta name="keywords" content="UUID generator, GUID generator, UUID v4, random UUID, generate UUID online, bulk UUID generator">
    <meta property="og:title" content="UUID Generator — DeskTools">
    <meta property="og:url" content="https://desktools.dev/uuid-generator">
    <link rel="canonical" href="https://desktools.dev/uuid-generator">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="tool-content">
    <div class="tool-page-header">
        <a href="/" class="back-link">← Back to tools</a>
        <h1>UUID Generator</h1>
        <p class="desc">Generate random v4 UUIDs — cryptographically secure, RFC 4122 compliant.</p>
    </div>
    <div class="workspace">
        <div class="color-workspace">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px;">
                <input type="text" id="uuid-output" readonly style="flex:1;padding:18px 20px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:1.2rem;letter-spacing:1px;text-align:center;">
                <button class="copy-btn" onclick="copyText(document.getElementById('uuid-output').value)" style="padding:18px 20px;">Copy</button>
                <button class="copy-btn" onclick="generateUUID()" style="padding:18px 20px;border-color:var(--accent);color:var(--accent);">↻</button>
            </div>
            <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;">
                <div style="display:flex;align-items:center;gap:8px;">
                    <label style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;">Format:</label>
                    <div class="toolbar-group transform-buttons">
                        <button class="active" id="fmt-default" onclick="setFormat('default',this)">Standard</button>
                        <button id="fmt-upper" onclick="setFormat('upper',this)">UPPERCASE</button>
                        <button id="fmt-nodash" onclick="setFormat('nodash',this)">No Dashes</button>
                        <button id="fmt-braces" onclick="setFormat('braces',this)">{Braces}</button>
                    </div>
                </div>
            </div>
            <div class="palette-section">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                    <h4 style="margin:0;">Bulk Generate</h4>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <label style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text-muted);">Count:</label>
                        <input type="number" id="uuid-count" value="10" min="1" max="100" style="width:60px;padding:6px 8px;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.8rem;text-align:center;">
                        <button class="copy-btn" onclick="bulkUUID()" style="border-color:var(--accent);color:var(--accent);">Generate</button>
                        <button class="copy-btn" onclick="copyText(document.getElementById('uuid-bulk').value)">Copy All</button>
                    </div>
                </div>
                <textarea id="uuid-bulk" readonly style="width:100%;min-height:200px;padding:16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:0.8rem;line-height:2;resize:vertical;"></textarea>
            </div>
        </div>
    </div>
</div>
<script src="/shared.js"></script>
<script>
    let uuidFormat = 'default';

    function generateRawUUID() {
        const bytes = new Uint8Array(16);
        crypto.getRandomValues(bytes);
        bytes[6] = (bytes[6] & 0x0f) | 0x40; // v4
        bytes[8] = (bytes[8] & 0x3f) | 0x80; // variant
        const hex = Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
        return hex.slice(0,8) + '-' + hex.slice(8,12) + '-' + hex.slice(12,16) + '-' + hex.slice(16,20) + '-' + hex.slice(20);
    }

    function formatUUID(uuid) {
        switch (uuidFormat) {
            case 'upper': return uuid.toUpperCase();
            case 'nodash': return uuid.replace(/-/g, '');
            case 'braces': return '{' + uuid + '}';
            default: return uuid;
        }
    }

    function generateUUID() {
        document.getElementById('uuid-output').value = formatUUID(generateRawUUID());
    }

    function setFormat(fmt, btn) {
        uuidFormat = fmt;
        document.querySelectorAll('.transform-buttons button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        generateUUID();
        // Re-format bulk if exists
        const bulk = document.getElementById('uuid-bulk').value;
        if (bulk) bulkUUID();
    }

    function bulkUUID() {
        const count = Math.min(100, Math.max(1, parseInt(document.getElementById('uuid-count').value) || 10));
        const uuids = [];
        for (let i = 0; i < count; i++) uuids.push(formatUUID(generateRawUUID()));
        document.getElementById('uuid-bulk').value = uuids.join('\n');
    }

    generateUUID();
</script>
</body>
</html>
