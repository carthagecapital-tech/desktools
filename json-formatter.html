<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter & Validator — Free Online Tool | DeskTools</title>
    <meta name="description" content="Free online JSON formatter, validator, and minifier. Paste messy JSON, get it prettified instantly. No signup, runs entirely in your browser.">
    <meta name="keywords" content="JSON formatter, JSON validator, JSON beautifier, JSON minifier, JSON prettifier, free online JSON tool">
    <meta property="og:title" content="JSON Formatter & Validator — DeskTools">
    <meta property="og:description" content="Free online JSON formatter. Paste, format, validate, and minify JSON — all client-side.">
    <meta property="og:url" content="https://desktools.dev/json-formatter">
    <link rel="canonical" href="https://desktools.dev/json-formatter">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="tool-content">
    <div class="tool-page-header">
        <a href="/" class="back-link">← Back to tools</a>
        <h1>JSON Formatter</h1>
        <p class="desc">Paste, format, validate, and minify JSON — all client-side.</p>
    </div>
    <div class="workspace">
        <div class="workspace-toolbar">
            <div class="toolbar-group">
                <button class="primary" onclick="formatJSON()">Format</button>
                <button onclick="minifyJSON()">Minify</button>
                <button onclick="copyOutput('json-output')">Copy</button>
            </div>
            <div class="toolbar-group">
                <button onclick="clearJSON()">Clear</button>
                <span id="json-status" style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text-muted)"></span>
            </div>
        </div>
        <div class="split-workspace">
            <div>
                <span class="pane-label">Input</span>
                <textarea class="tool-input" id="json-input" placeholder='{"paste": "your JSON here"}'></textarea>
            </div>
            <div>
                <span class="pane-label">Output</span>
                <pre class="tool-output" id="json-output" style="overflow:auto;white-space:pre-wrap;padding:20px;font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--text-primary)"></pre>
            </div>
        </div>
    </div>
</div>

<script src="/shared.js"></script>
<script>
    function formatJSON() {
        const input = document.getElementById('json-input').value;
        const output = document.getElementById('json-output');
        const status = document.getElementById('json-status');
        try {
            const parsed = JSON.parse(input);
            output.textContent = JSON.stringify(parsed, null, 2);
            status.textContent = '✓ Valid JSON';
            status.style.color = 'var(--accent)';
        } catch (e) {
            output.textContent = 'Error: ' + e.message;
            status.textContent = '✗ Invalid';
            status.style.color = '#ff6b6b';
        }
    }
    function minifyJSON() {
        const input = document.getElementById('json-input').value;
        const output = document.getElementById('json-output');
        try { output.textContent = JSON.stringify(JSON.parse(input)); }
        catch (e) { output.textContent = 'Error: ' + e.message; }
    }
    function clearJSON() {
        document.getElementById('json-input').value = '';
        document.getElementById('json-output').textContent = '';
        document.getElementById('json-status').textContent = '';
    }
</script>
</body>
</html>
