<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Unit Converter — DeskTools</title>
<meta name="description" content="Convert between common units — length, weight, temperature, area, speed, and more."/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#0f0f16;--bg3:#14141e;--border:rgba(255,255,255,0.07);--accent:#00d4aa;--accent2:#00b894;--text:#e8e8f0;--muted:#6b6b80;--card-bg:#111118}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1.05rem;color:var(--text);text-decoration:none}.nav-logo span{color:var(--accent)}
.back{display:flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.85rem;text-decoration:none;transition:color .2s}.back:hover{color:var(--accent)}
.page{max-width:700px;margin:0 auto;padding:2.5rem 2rem 4rem}
h1{font-size:1.8rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.4rem}
.sub{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.cats{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.75rem}
.cat-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:500;padding:.35rem .85rem;border-radius:7px;cursor:pointer;transition:all .2s}
.cat-btn:hover{color:var(--text);border-color:var(--border-hover)}
.cat-btn.active{background:rgba(0,212,170,0.1);border-color:var(--accent);color:var(--accent)}
.conv-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:1.75rem;margin-bottom:1.5rem}
.conv-row{display:grid;grid-template-columns:1fr auto 1fr;gap:1rem;align-items:end;margin-bottom:1.5rem}
.field label{font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);display:block;margin-bottom:.4rem}
.input-wrap{position:relative}
.input-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:1.4rem;padding:.65rem .85rem;outline:none;transition:border-color .2s}
.input-wrap input:focus{border-color:var(--accent)}
.input-wrap select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.83rem;padding:.4rem .6rem;outline:none;margin-top:.4rem;cursor:pointer}
.swap-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-bottom:2rem}
.swap-btn:hover{border-color:var(--accent);color:var(--accent);transform:rotate(180deg)}
.all-results{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.6rem}
.result-row{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:.75rem 1rem;cursor:pointer;transition:border-color .2s}
.result-row:hover{border-color:var(--accent)}
.result-val{font-family:'JetBrains Mono',monospace;font-size:.95rem;font-weight:700;color:var(--accent);display:block}
.result-unit{font-size:.75rem;color:var(--muted)}
footer{text-align:center;padding:2rem;border-top:1px solid var(--border);font-size:.8rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">desk<span>tools</span>.dev</a>
  <a href="/" class="back">← Back to tools</a>
</nav>
<div class="page">
  <h1>Unit Converter</h1>
  <p class="sub">Convert between length, weight, temperature, area, speed, and more.</p>

  <div class="cats" id="cats"></div>

  <div class="conv-card">
    <div class="conv-row">
      <div class="field">
        <label>From</label>
        <div class="input-wrap">
          <input type="number" id="fromVal" value="1" oninput="convert('from')"/>
          <select id="fromUnit" onchange="convert('from')"></select>
        </div>
      </div>
      <button class="swap-btn" onclick="swapUnits()">&#8646;</button>
      <div class="field">
        <label>To</label>
        <div class="input-wrap">
          <input type="number" id="toVal" readonly style="color:var(--accent)"/>
          <select id="toUnit" onchange="convert('from')"></select>
        </div>
      </div>
    </div>
    <div style="font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:.75rem">All conversions</div>
    <div class="all-results" id="allResults"></div>
  </div>
</div>
<footer>DeskTools &mdash; <a href="/">desktools.dev</a></footer>
<script>
const CATS={
  Length:{units:{Meter:1,Kilometer:0.001,Centimeter:100,Millimeter:1000,Mile:0.000621371,Yard:1.09361,Foot:3.28084,Inch:39.3701,'Nautical Mile':0.000539957},fmt:n=>+n.toPrecision(6)},
  Weight:{units:{Kilogram:1,Gram:1000,Milligram:1e6,Pound:2.20462,Ounce:35.274,Tonne:0.001,Stone:0.157473},fmt:n=>+n.toPrecision(6)},
  Temperature:{
    toBase:{Celsius:v=>v,Fahrenheit:v=>(v-32)*5/9,Kelvin:v=>v-273.15},
    fromBase:{Celsius:v=>v,Fahrenheit:v=>v*9/5+32,Kelvin:v=>v+273.15},
    units:['Celsius','Fahrenheit','Kelvin'],fmt:n=>+n.toFixed(4)
  },
  Area:{units:{Sq_Meter:1,Sq_Kilometer:1e-6,Sq_Mile:3.861e-7,Sq_Foot:10.7639,Sq_Inch:1550,Acre:0.000247105,Hectare:0.0001},fmt:n=>+n.toPrecision(6)},
  Speed:{units:{'m/s':1,'km/h':3.6,'mph':2.23694,'knot':1.94384,'ft/s':3.28084},fmt:n=>+n.toPrecision(6)},
  Volume:{units:{Liter:1,Milliliter:1000,'Cubic Meter':0.001,Gallon_US:0.264172,'Fl Oz':33.814,Pint_US:2.11338,Cup_US:4.22675,Tablespoon:67.628,Teaspoon:202.884},fmt:n=>+n.toPrecision(6)},
  Data:{units:{Byte:1,Kilobyte:1/1024,Megabyte:1/1048576,Gigabyte:1/1073741824,Terabyte:1/1099511627776,Bit:8},fmt:n=>+n.toPrecision(6)},
};
let cat='Length';
function buildCats(){
  const el=document.getElementById('cats'); el.innerHTML='';
  Object.keys(CATS).forEach(k=>{
    const b=document.createElement('button'); b.className='cat-btn'+(k===cat?' active':'');
    b.textContent=k; b.onclick=()=>{cat=k;buildCats();buildUnits();convert('from');};
    el.appendChild(b);
  });
}
function unitList(){const c=CATS[cat];return c.units?Object.keys(c.units):c.units;}
function buildUnits(){
  const ul=unitList();
  ['fromUnit','toUnit'].forEach((id,i)=>{
    const sel=document.getElementById(id); sel.innerHTML='';
    ul.forEach(u=>{const o=document.createElement('option');o.value=u;o.textContent=u.replace(/_/g,' ');sel.appendChild(o);});
    sel.value=ul[i===0?0:1];
  });
}
function toBase(val,unit){
  const c=CATS[cat];
  if(c.toBase) return c.toBase[unit](val);
  return val/c.units[unit];
}
function fromBase(base,unit){
  const c=CATS[cat];
  if(c.fromBase) return c.fromBase[unit](base);
  return base*c.units[unit];
}
function convert(dir){
  const fv=+document.getElementById('fromVal').value;
  const fu=document.getElementById('fromUnit').value;
  const tu=document.getElementById('toUnit').value;
  const c=CATS[cat];
  const base=toBase(fv,fu);
  const res=fromBase(base,tu);
  document.getElementById('toVal').value=isFinite(res)?c.fmt(res):'—';
  const el=document.getElementById('allResults'); el.innerHTML='';
  unitList().forEach(u=>{
    const v=fromBase(base,u);
    const d=document.createElement('div'); d.className='result-row';
    d.innerHTML=`<span class="result-val">${isFinite(v)?c.fmt(v):'—'}</span><span class="result-unit">${u.replace(/_/g,' ')}</span>`;
    d.onclick=()=>{document.getElementById('toUnit').value=u;convert('from');};
    el.appendChild(d);
  });
}
function swapUnits(){
  const f=document.getElementById('fromUnit').value;
  const t=document.getElementById('toUnit').value;
  document.getElementById('fromUnit').value=t;
  document.getElementById('toUnit').value=f;
  convert('from');
}
buildCats(); buildUnits(); convert('from');
</script>
</body>
</html>
