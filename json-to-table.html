<body>
<div class="tool-content">
    <div class="tool-page-header">
        <a href="/" class="back-link">← Back to tools</a>
        <h1>JSON to Table</h1>
        <p class="desc">Paste JSON array data, get a clean readable table. Great for sharing API data with clients.</p>
    </div>
    <div class="workspace">
        <div class="workspace-toolbar">
            <div class="toolbar-group">
                <button class="primary" onclick="jsonToTable()">Convert</button>
                <button onclick="loadExample()">Load Example</button>
                <button onclick="document.getElementById('jt-input').value='';document.getElementById('jt-output').innerHTML=''">Clear</button>
            </div>
            <div class="toolbar-group">
                <button onclick="copyTableHtml()">Copy HTML</button>
                <span id="jt-status" style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text-muted)"></span>
            </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1.5fr;">
            <div style="border-right:1px solid var(--border);position:relative;">
                <span style="position:absolute;top:8px;right:12px;font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">JSON Input</span>
                <textarea class="tool-input" id="jt-input" placeholder='[{"name": "Alice", "role": "Developer"}, {"name": "Bob", "role": "Designer"}]' style="min-height:400px;"></textarea>
            </div>
            <div style="position:relative;overflow:auto;">
                <span style="position:absolute;top:8px;right:12px;font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;z-index:1;">Table Output</span>
                <div id="jt-output" style="padding:20px;min-height:400px;overflow:auto;"></div>
            </div>
        </div>
    </div>
</div>
<script src="/shared.js"></script>
<script>
    function jsonToTable() {
        const input = document.getElementById('jt-input').value;
        const output = document.getElementById('jt-output');
        const status = document.getElementById('jt-status');
        try {
            let data = JSON.parse(input);
            if (!Array.isArray(data)) {
                if (typeof data === 'object') data = [data];
                else throw new Error('Input must be a JSON array or object');
            }
            if (data.length === 0) { output.innerHTML = '<span style="color:var(--text-muted)">Empty array</span>'; return; }
            const keys = [...new Set(data.flatMap(obj => Object.keys(obj)))];
            let html = '<table style="width:100%;border-collapse:collapse;font-size:0.85rem;">';
            html += '<thead><tr>';
            keys.forEach(k => { html += '<th style="padding:10px 14px;border:1px solid var(--border);background:var(--bg-surface);color:var(--accent);font-family:JetBrains Mono,monospace;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px;text-align:left;">' + escHtml(k) + '</th>'; });
            html += '</tr></thead><tbody>';
            data.forEach((row, i) => {
                html += '<tr style="background:' + (i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,0.02)') + ';">';
                keys.forEach(k => {
                    let val = row[k];
                    if (val === null || val === undefined) val = '';
                    else if (typeof val === 'object') val = JSON.stringify(val);
                    html += '<td style="padding:10px 14px;border:1px solid var(--border);color:var(--text-primary);font-family:JetBrains Mono,monospace;font-size:0.8rem;">' + escHtml(String(val)) + '</td>';
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            output.innerHTML = html;
            status.textContent = data.length + ' row' + (data.length !== 1 ? 's' : '') + ' × ' + keys.length + ' column' + (keys.length !== 1 ? 's' : '');
            status.style.color = 'var(--accent)';
        } catch (e) {
            output.innerHTML = '<span style="color:#ff6b6b;">Error: ' + e.message + '</span>';
            status.textContent = '✗ Invalid';
            status.style.color = '#ff6b6b';
        }
    }
    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function loadExample() {
        document.getElementById('jt-input').value = JSON.stringify([
            { "id": 1, "name": "Alice Johnson", "role": "Frontend Developer", "status": "Active", "hours": 38 },
            { "id": 2, "name": "Bob Smith", "role": "UI Designer", "status": "Active", "hours": 42 },
            { "id": 3, "name": "Carol White", "role": "Project Manager", "status": "On Leave", "hours": 0 },
            { "id": 4, "name": "Dan Brown", "role": "Backend Developer", "status": "Active", "hours": 45 },
            { "id": 5, "name": "Eve Davis", "role": "QA Engineer", "status": "Active", "hours": 36 }
        ], null, 2);
        jsonToTable();
    }
    function copyTableHtml() {
        const html = document.getElementById('jt-output').innerHTML;
        if (!html) { showToast('Nothing to copy'); return; }
        navigator.clipboard.writeText(html);
        showToast('HTML table copied');
    }
</script>
</body>
</html>
