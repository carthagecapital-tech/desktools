<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Page Not Found — DeskTools</title>
<meta name="description" content="This page doesn't exist. Browse our 43 free browser-based tools for developers, designers, and teams."/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#0f0f16;--bg3:#14141e;--border:rgba(255,255,255,0.07);--accent:#00d4aa;--text:#e8e8f0;--muted:#6b6b80}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.content{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.box{max-width:440px}
.code{font-family:'JetBrains Mono',monospace;font-size:6rem;font-weight:700;color:var(--accent);line-height:1;margin-bottom:.5rem;opacity:.3}
h1{font-size:1.6rem;font-weight:700;margin-bottom:.6rem;letter-spacing:-.02em}
p{color:var(--muted);font-size:1rem;line-height:1.6;margin-bottom:2rem}
.actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1.25rem;border-radius:8px;font-family:'Outfit',sans-serif;font-weight:600;font-size:.9rem;text-decoration:none;transition:all .2s;cursor:pointer;border:none}
.btn-primary{background:var(--accent);color:#0a0a0f}
.btn-primary:hover{background:#00b894}
.btn-secondary{background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.hint{margin-top:2.5rem;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--muted)}
.hint kbd{background:var(--bg3);padding:.15rem .4rem;border-radius:4px;border:1px solid var(--border);font-size:.72rem}
</style>
</head>
<body>
<div class="content">
  <div class="box">
    <div class="code">404</div>
    <h1>This page doesn't exist</h1>
    <p>The tool you're looking for might have been moved or doesn't exist yet. Browse our collection or search for what you need.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">Browse all tools</a>
      <button class="btn btn-secondary" onclick="if(typeof openPalette==='function')openPalette();else window.location='/'">Search tools</button>
    </div>
    <div class="hint">Pro tip: Press <kbd>/</kbd> on any page to quickly search tools</div>
  </div>
</div>
<script src="/shared.js"></script>
</body>
</html>
