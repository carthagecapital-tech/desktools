<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebApplication","name":"Password Generator","description":"Generate strong, random passwords with custom length and character sets. Uses cryptographic randomness. No data leaves your browser.","url":"https://desktools.dev/password-generator","applicationCategory":"WebApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"USD"},"author":{"@type":"Organization","name":"DeskTools","url":"https://desktools.dev"},"browserRequirements":"Requires a modern web browser","keywords":"password generator, random password, secure password"}</script>

<meta name="twitter:title" content="Password Generator — Free Secure Random Passwords | DeskTools"/>
<meta name="twitter:description" content="Generate strong, random passwords with custom length and character sets. Uses cryptographic randomness. No data leaves your browser."/>
</head>
<body>
<div class="tool-content">
    <div class="tool-page-header">
        <a href="/" class="back-link">← Back to tools</a>
        <h1>Password Generator</h1>
        <p class="desc">Generate strong, random passwords — everything runs locally in your browser.</p>
    </div>
    <div class="workspace">
        <div class="color-workspace">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px;">
                <input type="text" id="pw-output" readonly style="flex:1;padding:16px 20px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:1.2rem;letter-spacing:1px;">
                <button class="copy-btn" onclick="copyText(document.getElementById('pw-output').value)" style="padding:16px 20px;">Copy</button>
                <button class="copy-btn" onclick="generatePassword()" style="padding:16px 20px;border-color:var(--accent);color:var(--accent);">↻</button>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div>
                    <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;">Length: <span id="pw-length-val">20</span></label>
                    <input type="range" id="pw-length" min="6" max="64" value="20" oninput="document.getElementById('pw-length-val').textContent=this.value;generatePassword()" style="width:100%;accent-color:var(--accent);">
                </div>
                <div style="display:flex;flex-direction:column;gap:10px;">
                    <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-secondary);cursor:pointer;"><input type="checkbox" id="pw-upper" checked onchange="generatePassword()" style="accent-color:var(--accent);"> Uppercase (A-Z)</label>
                    <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-secondary);cursor:pointer;"><input type="checkbox" id="pw-lower" checked onchange="generatePassword()" style="accent-color:var(--accent);"> Lowercase (a-z)</label>
                    <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-secondary);cursor:pointer;"><input type="checkbox" id="pw-numbers" checked onchange="generatePassword()" style="accent-color:var(--accent);"> Numbers (0-9)</label>
                    <label style="display:flex;align-items:center;gap:8px;font-size:0.85rem;color:var(--text-secondary);cursor:pointer;"><input type="checkbox" id="pw-symbols" checked onchange="generatePassword()" style="accent-color:var(--accent);"> Symbols (!@#$...)</label>
                </div>
            </div>
            <div style="margin-top:24px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <span style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text-muted);text-transform:uppercase;">Strength</span>
                    <span id="pw-strength-label" style="font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--accent);">Strong</span>
                </div>
                <div style="height:4px;background:var(--bg-surface);border-radius:2px;overflow:hidden;"><div id="pw-strength-bar" style="height:100%;width:80%;background:var(--accent);border-radius:2px;transition:all 0.3s;"></div></div>
            </div>
            <div class="palette-section"><h4>Bulk Generate</h4><button class="copy-btn" onclick="bulkGenerate()" style="margin-bottom:16px;">Generate 10 passwords</button><pre id="pw-bulk" style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--text-secondary);line-height:2;min-height:40px;"></pre></div>
        </div>
    </div>
</div>
<script src="/shared.js"></script>
<script>
    function generatePassword(){const len=parseInt(document.getElementById('pw-length').value);let chars='';if(document.getElementById('pw-upper').checked)chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';if(document.getElementById('pw-lower').checked)chars+='abcdefghijklmnopqrstuvwxyz';if(document.getElementById('pw-numbers').checked)chars+='0123456789';if(document.getElementById('pw-symbols').checked)chars+='!@#$%^&*()_+-=[]{}|;:,.<>?';if(!chars){document.getElementById('pw-output').value='';return;}const arr=new Uint32Array(len);crypto.getRandomValues(arr);let pw='';for(let i=0;i<len;i++)pw+=chars[arr[i]%chars.length];document.getElementById('pw-output').value=pw;updateStrength(pw);}
    function updateStrength(pw){let score=0;if(pw.length>=8)score++;if(pw.length>=12)score++;if(pw.length>=20)score++;if(/[A-Z]/.test(pw))score++;if(/[a-z]/.test(pw))score++;if(/[0-9]/.test(pw))score++;if(/[^A-Za-z0-9]/.test(pw))score++;const pct=Math.min(100,(score/7)*100);const bar=document.getElementById('pw-strength-bar');const label=document.getElementById('pw-strength-label');bar.style.width=pct+'%';if(pct<40){bar.style.background='#ff6b6b';label.textContent='Weak';label.style.color='#ff6b6b';}else if(pct<70){bar.style.background='#ffd93d';label.textContent='Fair';label.style.color='#ffd93d';}else{bar.style.background='var(--accent)';label.textContent='Strong';label.style.color='var(--accent)';}}
    function bulkGenerate(){const el=document.getElementById('pw-bulk');let r=[];for(let i=0;i<10;i++){generatePassword();r.push(document.getElementById('pw-output').value);}el.textContent=r.join('\n');}
    generatePassword();
</script>
</body>
</html>
