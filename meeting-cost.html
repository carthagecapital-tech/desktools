<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Meeting Cost Calculator — DeskTools</title>
<meta name="description" content="Enter attendee count, hourly rates, and duration. See the real cost of your meeting."/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#0f0f16;--bg3:#14141e;--border:rgba(255,255,255,0.07);--accent:#00d4aa;--accent2:#00b894;--text:#e8e8f0;--muted:#6b6b80;--card-bg:#111118}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1.05rem;color:var(--text);text-decoration:none}.nav-logo span{color:var(--accent)}
.back{display:flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.85rem;text-decoration:none;transition:color .2s}.back:hover{color:var(--accent)}
.page{max-width:660px;margin:0 auto;padding:2.5rem 2rem 4rem}
h1{font-size:1.8rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.4rem}
.sub{color:var(--muted);font-size:.95rem;margin-bottom:2rem}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem}
.card-title{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:1.1rem}
.field{margin-bottom:1rem}
.field label{font-size:.82rem;color:var(--muted);display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem}
.field label span{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--accent)}
input[type=range]{width:100%;accent-color:var(--accent)}
input[type=number]{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.95rem;padding:.45rem .75rem;outline:none;width:100%;transition:border-color .2s}
input[type=number]:focus{border-color:var(--accent)}
select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.9rem;padding:.45rem .75rem;outline:none;cursor:pointer}
.attendees-grid{display:flex;flex-direction:column;gap:.6rem;margin-top:.5rem}
.attendee-row{display:grid;grid-template-columns:1fr 130px 32px;gap:.6rem;align-items:center}
.attendee-role{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.85rem;padding:.4rem .7rem;outline:none;width:100%;transition:border-color .2s}
.attendee-role:focus{border-color:var(--accent)}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:.2rem .3rem;border-radius:4px;transition:color .15s}
.del-btn:hover{color:#ff6b6b}
.add-att{background:none;border:1px dashed var(--border);color:var(--muted);font-family:'Outfit',sans-serif;font-size:.82rem;padding:.4rem;border-radius:8px;cursor:pointer;width:100%;margin-top:.5rem;transition:all .2s}
.add-att:hover{border-color:var(--accent);color:var(--accent)}
.cost-display{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:2rem;text-align:center;margin-bottom:1.25rem}
.cost-main{font-family:'JetBrains Mono',monospace;font-size:3rem;font-weight:700;color:var(--accent);line-height:1}
.cost-label{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:.4rem}
.cost-ticker{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--muted);margin-top:.75rem}
.breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem;margin-bottom:1.25rem}
.bk-box{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:.9rem;text-align:center}
.bk-num{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;color:var(--text);display:block}
.bk-lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.btn-row{display:flex;gap:.75rem}
.btn{flex:1;font-family:'Outfit',sans-serif;font-weight:600;font-size:.9rem;border:none;border-radius:8px;padding:.65rem;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:#0a0a0f}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--muted)}.btn-secondary:hover{color:var(--text)}
.btn.copied{background:#1a6b5a;color:var(--text)}
footer{text-align:center;padding:2rem;border-top:1px solid var(--border);font-size:.8rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}

    nav { position:sticky; top:0; z-index:100; background:rgba(10,10,15,0.92); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:58px; }
    .nav-logo { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:1.05rem; color:var(--text); text-decoration:none; letter-spacing:-0.02em; }
    .nav-logo span { color:var(--accent); }
    .nav-links { display:flex; align-items:center; gap:1rem; }
    .nav-links a { color:var(--muted); font-size:.9rem; text-decoration:none; transition:color .2s; }
    .nav-links a:hover { color:var(--text); }
    .btn-request { background:var(--accent); color:#0a0a0f; font-family:'Outfit',sans-serif; font-weight:600; font-size:.85rem; border:none; border-radius:8px; padding:.45rem 1rem; cursor:pointer; transition:background .2s; }
    .btn-request:hover { background:var(--accent2); }
    .back-link { display:inline-flex; align-items:center; gap:.4rem; color:var(--muted); font-size:.85rem; text-decoration:none; padding:.75rem 2rem; transition:color .2s; }
    .back-link:hover { color:var(--accent); }
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">desk<span>tools</span>.dev</a>
  <div class="nav-links">
    <a href="/">Tools</a>
    <button class="btn-request" onclick="openModal()">Request a Tool</button>
  </div>
</nav>
<a href="/" class="back-link">&#x2190; Back to tools</a><div class="page">
  <h1>Meeting Cost Calculator</h1>
  <p class="sub">See the real cost of a meeting in real time. Is it worth it?</p>

  <div class="card">
    <div class="card-title">Attendees</div>
    <div class="attendees-grid" id="attendeesGrid"></div>
    <button class="add-att" onclick="addAttendee()">+ Add attendee</button>
  </div>

  <div class="card">
    <div class="card-title">Meeting Details</div>
    <div class="field">
      <label>Duration <span id="durLabel">60 min</span></label>
      <input type="range" id="duration" min="5" max="240" step="5" value="60" oninput="calc()"/>
    </div>
    <div class="field">
      <label>Currency</label>
      <select id="currency" onchange="calc()">
        <option value="$">USD ($)</option><option value="€">EUR (€)</option><option value="£">GBP (£)</option>
        <option value="CA$">CAD (CA$)</option><option value="AED">AED</option>
      </select>
    </div>
  </div>

  <div class="cost-display">
    <div class="cost-main" id="costMain">$0.00</div>
    <div class="cost-label">Total meeting cost</div>
    <div class="cost-ticker" id="costTicker">$0.00 / minute</div>
  </div>

  <div class="breakdown">
    <div class="bk-box"><span class="bk-num" id="bkAttend">0</span><span class="bk-lbl">Attendees</span></div>
    <div class="bk-box"><span class="bk-num" id="bkDur">0 min</span><span class="bk-lbl">Duration</span></div>
    <div class="bk-box"><span class="bk-num" id="bkPerMin">$0</span><span class="bk-lbl">Per Minute</span></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="copyBtn" onclick="copyReport()">Copy Report</button>
    <button class="btn btn-secondary" onclick="resetAll()">Reset</button>
  </div>
</div>
<footer>DeskTools &mdash; <a href="/">desktools.dev</a></footer>
<script>
let attendees=[{role:'Developer',rate:80},{role:'Designer',rate:65},{role:'Manager',rate:90}];
function renderAttendees(){
  const el=document.getElementById('attendeesGrid'); el.innerHTML='';
  attendees.forEach((a,i)=>{
    const r=document.createElement('div'); r.className='attendee-row';
    r.innerHTML=`<input class="attendee-role" type="text" value="${a.role}" placeholder="Role/Name" oninput="attendees[${i}].role=this.value"/>
      <input type="number" min="0" step="1" value="${a.rate}" placeholder="$/hr" oninput="attendees[${i}].rate=+this.value;calc()"/>
      ${attendees.length>1?`<button class="del-btn" onclick="removeAtt(${i})">&#x2715;</button>`:'<span></span>'}`;
    el.appendChild(r);
  });
  calc();
}
function addAttendee(){attendees.push({role:'Attendee',rate:60});renderAttendees();}
function removeAtt(i){attendees.splice(i,1);renderAttendees();}
function calc(){
  const dur=+document.getElementById('duration').value;
  const c=document.getElementById('currency').value;
  const totalHourly=attendees.reduce((s,a)=>s+a.rate,0);
  const perMin=totalHourly/60;
  const total=perMin*dur;
  document.getElementById('durLabel').textContent=dur+' min';
  document.getElementById('costMain').textContent=c+total.toFixed(2);
  document.getElementById('costTicker').textContent=c+perMin.toFixed(2)+' / minute';
  document.getElementById('bkAttend').textContent=attendees.length;
  document.getElementById('bkDur').textContent=dur+' min';
  document.getElementById('bkPerMin').textContent=c+perMin.toFixed(2);
}
function copyReport(){
  const dur=+document.getElementById('duration').value;
  const c=document.getElementById('currency').value;
  const totalHourly=attendees.reduce((s,a)=>s+a.rate,0);
  const total=(totalHourly/60)*dur;
  let txt='MEETING COST REPORT\n'+'—'.repeat(28)+'\n';
  attendees.forEach(a=>txt+=`${a.role.padEnd(20)} ${c}${a.rate}/hr\n`);
  txt+='\n'+'—'.repeat(28)+'\n';
  txt+=`Duration:  ${dur} minutes\nTotal:     ${c}${total.toFixed(2)}\nPer min:   ${c}${(totalHourly/60).toFixed(2)}`;
  navigator.clipboard.writeText(txt);
  const b=document.getElementById('copyBtn');b.textContent='Copied!';b.classList.add('copied');
  setTimeout(()=>{b.textContent='Copy Report';b.classList.remove('copied');},1800);
}
function resetAll(){attendees=[{role:'Developer',rate:80},{role:'Designer',rate:65},{role:'Manager',rate:90}];document.getElementById('duration').value=60;renderAttendees();}
renderAttendees();
</script>
</body>
</html>
