<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Encoder & Decoder — Free Online Tool | DeskTools</title>
    <meta name="description" content="Free online URL encoder and decoder. Encode special characters for URLs or decode percent-encoded strings. Supports encodeURI and encodeURIComponent modes.">
    <meta name="keywords" content="URL encoder, URL decoder, percent encoding, encodeURIComponent, URL encode online, decode URL">
    <meta property="og:title" content="URL Encoder & Decoder — DeskTools">
    <meta property="og:url" content="https://desktools.dev/url-encoder">
    <link rel="canonical" href="https://desktools.dev/url-encoder">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="tool-content">
    <div class="tool-page-header">
        <a href="/" class="back-link">← Back to tools</a>
        <h1>URL Encoder / Decoder</h1>
        <p class="desc">Encode special characters for URLs or decode percent-encoded strings.</p>
    </div>
    <div class="workspace">
        <div class="workspace-toolbar">
            <div class="toolbar-group">
                <button class="primary" id="url-encode-btn" onclick="doUrl('encode')">Encode →</button>
                <button id="url-decode-btn" onclick="doUrl('decode')">← Decode</button>
            </div>
            <div class="toolbar-group">
                <label style="display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--text-secondary);font-family:'JetBrains Mono',monospace;cursor:pointer;"><input type="checkbox" id="url-component" checked style="accent-color:var(--accent);"> Component mode</label>
                <button onclick="copyOutput('url-output')">Copy</button>
                <button onclick="swapUrl()">⇄ Swap</button>
            </div>
        </div>
        <div class="split-workspace">
            <div><span class="pane-label">Input</span><textarea class="tool-input" id="url-input" placeholder="Enter URL or text to encode/decode..."></textarea></div>
            <div><span class="pane-label">Output</span><textarea class="tool-input" id="url-output" readonly style="color:var(--accent);background:transparent;"></textarea></div>
        </div>
    </div>
    <div style="padding:16px 20px;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text-muted);display:flex;gap:20px;flex-wrap:wrap;">
        <span>Quick test: </span>
        <span style="cursor:pointer;color:var(--text-secondary);" onclick="document.getElementById('url-input').value='https://desktools.dev/search?q=hello world&lang=en&special=a+b=c';doUrl('encode')">URL with spaces</span>
        <span style="cursor:pointer;color:var(--text-secondary);" onclick="document.getElementById('url-input').value='https%3A%2F%2Fdesktools.dev%2Fsearch%3Fq%3Dhello%20world%26lang%3Den';doUrl('decode')">Encoded URL</span>
        <span style="cursor:pointer;color:var(--text-secondary);" onclick="document.getElementById('url-input').value='name=John Doe&city=New York&emoji=😀';doUrl('encode')">Query string</span>
    </div>
</div>
<script src="/shared.js"></script>
<script>
    function doUrl(mode){const input=document.getElementById('url-input').value;const output=document.getElementById('url-output');const component=document.getElementById('url-component').checked;try{let result;if(mode==='encode'){result=component?encodeURIComponent(input):encodeURI(input);document.getElementById('url-encode-btn').classList.add('primary');document.getElementById('url-decode-btn').classList.remove('primary');}else{result=component?decodeURIComponent(input):decodeURI(input);document.getElementById('url-decode-btn').classList.add('primary');document.getElementById('url-encode-btn').classList.remove('primary');}output.value=result;}catch(e){output.value='Error: '+e.message;}}
    function swapUrl(){const i=document.getElementById('url-input');const o=document.getElementById('url-output');const t=i.value;i.value=o.value;o.value=t;}
</script>
</body>
</html>
