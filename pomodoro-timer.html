<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pomodoro Timer — DeskTools</title>
<meta name="description" content="A clean focus timer with work and break intervals. Boost productivity without distractions."/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#0f0f16;--bg3:#14141e;--border:rgba(255,255,255,0.07);--accent:#00d4aa;--accent2:#00b894;--text:#e8e8f0;--muted:#6b6b80;--card-bg:#111118}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
nav{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:1.05rem;color:var(--text);text-decoration:none}.nav-logo span{color:var(--accent)}
.back{display:flex;align-items:center;gap:.4rem;color:var(--muted);font-size:.85rem;text-decoration:none;transition:color .2s}.back:hover{color:var(--accent)}
.page{max-width:480px;margin:0 auto;padding:3rem 2rem 4rem;text-align:center}
h1{font-size:1.8rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.4rem}
.sub{color:var(--muted);font-size:.95rem;margin-bottom:2.5rem}
.mode-tabs{display:flex;gap:.4rem;background:var(--bg3);border-radius:10px;padding:.3rem;margin-bottom:2.5rem}
.mode-tab{flex:1;background:none;border:none;color:var(--muted);font-family:'Outfit',sans-serif;font-size:.85rem;font-weight:500;padding:.45rem;border-radius:7px;cursor:pointer;transition:all .2s}
.mode-tab.active{background:var(--accent);color:#0a0a0f}
.timer-ring{position:relative;width:240px;height:240px;margin:0 auto 2.5rem}
.timer-ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg3);stroke-width:8}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .5s linear,stroke .4s}
.ring-fg.break{stroke:#7c3aed}
.timer-display{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-time{font-family:'JetBrains Mono',monospace;font-size:3rem;font-weight:700;color:var(--text);line-height:1}
.timer-label{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:.4rem}
.controls{display:flex;gap:.75rem;justify-content:center;margin-bottom:2.5rem}
.ctrl-btn{background:var(--card-bg);border:1px solid var(--border);color:var(--text);font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;padding:.65rem 1.75rem;border-radius:10px;cursor:pointer;transition:all .2s}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.ctrl-btn.primary{background:var(--accent);color:#0a0a0f;border-color:transparent}
.ctrl-btn.primary:hover{background:var(--accent2)}
.settings{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:2rem}
.set-field{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:.85rem .75rem;text-align:center}
.set-field label{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);display:block;margin-bottom:.5rem}
.set-field input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;width:60px;padding:.3rem;text-align:center;outline:none;transition:border-color .2s}
.set-field input:focus{border-color:var(--accent)}
.sessions{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap}
.session-dot{width:10px;height:10px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);transition:all .3s}
.session-dot.done{background:var(--accent);border-color:var(--accent)}
.session-dot.break-done{background:#7c3aed;border-color:#7c3aed}
footer{text-align:center;padding:2rem;border-top:1px solid var(--border);font-size:.8rem;color:var(--muted)}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">desk<span>tools</span>.dev</a>
  <a href="/" class="back"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> All Tools</a>
</nav>
<div class="page">
  <h1>Pomodoro Timer</h1>
  <p class="sub">Focus in intervals. Work, rest, repeat.</p>

  <div class="mode-tabs">
    <button class="mode-tab active" id="tabWork" onclick="switchMode('work')">Focus</button>
    <button class="mode-tab" id="tabShort" onclick="switchMode('short')">Short Break</button>
    <button class="mode-tab" id="tabLong" onclick="switchMode('long')">Long Break</button>
  </div>

  <div class="timer-ring">
    <svg width="240" height="240" viewBox="0 0 240 240">
      <circle class="ring-bg" cx="120" cy="120" r="108"/>
      <circle class="ring-fg" id="ringFg" cx="120" cy="120" r="108"/>
    </svg>
    <div class="timer-display">
      <div class="timer-time" id="timerDisplay">25:00</div>
      <div class="timer-label" id="timerLabel">Focus</div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn primary" id="startBtn" onclick="toggleTimer()">Start</button>
    <button class="ctrl-btn" onclick="resetTimer()">Reset</button>
  </div>

  <div class="settings">
    <div class="set-field"><label>Focus</label><input type="number" id="workMin" min="1" max="99" value="25" onchange="resetTimer()"/> min</div>
    <div class="set-field"><label>Short Break</label><input type="number" id="shortMin" min="1" max="30" value="5" onchange="resetTimer()"/> min</div>
    <div class="set-field"><label>Long Break</label><input type="number" id="longMin" min="1" max="60" value="15" onchange="resetTimer()"/> min</div>
  </div>

  <div class="sessions" id="sessions"></div>
</div>
<footer>DeskTools &mdash; <a href="/">desktools.dev</a></footer>
<script>
const CIRC=2*Math.PI*108;
let mode='work', running=false, interval=null, remaining=0, total=0, session=0, history=[];
const ring=document.getElementById('ringFg');
ring.style.strokeDasharray=CIRC; ring.style.strokeDashoffset=0;

function getMins(){
  return {work:+document.getElementById('workMin').value,short:+document.getElementById('shortMin').value,long:+document.getElementById('longMin').value};
}
function switchMode(m){
  if(running)return;
  mode=m;
  ['work','short','long'].forEach(k=>document.getElementById('tab'+k.charAt(0).toUpperCase()+k.slice(1)).classList.remove('active'));
  document.getElementById('tab'+m.charAt(0).toUpperCase()+m.slice(1)).classList.add('active');
  const mins=getMins();
  remaining=total=(mode==='work'?mins.work:mode==='short'?mins.short:mins.long)*60;
  ring.className='ring-fg'+(mode!=='work'?' break':'');
  updateDisplay();
}
function pad(n){return String(n).padStart(2,'0');}
function updateDisplay(){
  const m=Math.floor(remaining/60),s=remaining%60;
  document.getElementById('timerDisplay').textContent=pad(m)+':'+pad(s);
  document.getElementById('timerLabel').textContent=mode==='work'?'Focus':mode==='short'?'Short Break':'Long Break';
  const offset=CIRC*(1-remaining/total);
  ring.style.strokeDashoffset=offset;
  document.title=pad(m)+':'+pad(s)+' — DeskTools Pomodoro';
}
function toggleTimer(){
  if(running){clearInterval(interval);running=false;document.getElementById('startBtn').textContent='Resume';}
  else{running=true;document.getElementById('startBtn').textContent='Pause';
    interval=setInterval(()=>{
      if(remaining<=0){clearInterval(interval);running=false;done();return;}
      remaining--;updateDisplay();
    },1000);
  }
}
function done(){
  if(mode==='work'){session++;history.push('work');renderSessions();}
  else history.push('break');
  renderSessions();
  notify();
  document.getElementById('startBtn').textContent='Start';
}
function resetTimer(){
  clearInterval(interval);running=false;
  const mins=getMins();
  remaining=total=(mode==='work'?mins.work:mode==='short'?mins.short:mins.long)*60;
  document.getElementById('startBtn').textContent='Start';
  ring.style.strokeDashoffset=0;
  updateDisplay();
}
function renderSessions(){
  const el=document.getElementById('sessions'); el.innerHTML='';
  for(let i=0;i<Math.max(session,4);i++){
    const d=document.createElement('div');d.className='session-dot'+(i<session?' done':'');
    el.appendChild(d);
  }
}
function notify(){
  if(Notification.permission==='granted') new Notification('DeskTools Pomodoro',{body:mode==='work'?'Focus session done! Take a break.':'Break over! Back to work.'});
}
if(Notification.permission==='default') Notification.requestPermission();
switchMode('work'); renderSessions();
</script>
</body>
</html>
